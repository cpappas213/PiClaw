name: Build PiClaw Image

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 4 1 * *'  # Monthly on the 1st at 4am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout PiClaw
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build image
        uses: usimd/pi-gen-action@v1
        id: build
        with:
          image-name: PiClaw
          pi-gen-version: arm64
          hostname: piclaw
          username: pi
          password: piclaw
          enable-ssh: 1
          stage-list: stage0 stage1 stage2 ./stage-openclaw
          compression: xz
          locale: en_US.UTF-8
          keyboard-keymap: us
          keyboard-layout: English (US)
          timezone: Etc/UTC
          verbose-output: true

      - name: Get date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: piclaw-${{ steps.date.outputs.date }}
          path: ${{ steps.build.outputs.image-path }}
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.image-path }}
          generate_release_notes: true
