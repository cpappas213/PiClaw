name: Build PiClaw Image

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 4 1 * *'  # Monthly on the 1st at 4am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout PiClaw
        uses: actions/checkout@v4

      - name: Clone pi-gen
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git

      - name: Configure build
        run: |
          cp config pi-gen/config
          cp -r stage-openclaw pi-gen/stage-openclaw
          touch pi-gen/stage0/SKIP_IMAGES pi-gen/stage1/SKIP_IMAGES pi-gen/stage2/SKIP_IMAGES

      - name: Set up QEMU for ARM64
        run: |
          # Install host QEMU binary (so pi-gen's "which qemu-aarch64" passes)
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          # Re-register with F flag (fix-binary) so it works inside Docker containers
          docker run --rm --privileged tonistiigi/binfmt --install arm64

      - name: Build image
        run: |
          cd pi-gen
          ./build-docker.sh

      - name: Find image file
        id: image
        run: |
          IMAGE=$(find pi-gen/deploy -name "*.img.*" -o -name "*.zip" | head -1)
          echo "path=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${IMAGE})" >> "$GITHUB_OUTPUT"
          echo "Found image: ${IMAGE}"
          ls -lah pi-gen/deploy/

      - name: Get date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: piclaw-${{ steps.date.outputs.date }}
          path: ${{ steps.image.outputs.path }}
          retention-days: 30

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing 'latest' release if it exists
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          # Create new 'latest' release
          gh release create latest \
            --title "Latest PiClaw Image" \
            --notes "Built on $(date -u +%Y-%m-%d) from commit $(git rev-parse --short HEAD).

          Flash this image to an SD card or USB SSD, boot your Raspberry Pi, and run \`openclaw onboard --install-daemon\` to get started." \
            --latest \
            "${{ steps.image.outputs.path }}"

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.image.outputs.path }}
          generate_release_notes: true
